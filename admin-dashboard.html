<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="img/sai.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Admin Lead Dashboard | Saishnaa Software Solutions</title>
    <meta name="description" content="Private administration panel for reviewing local inquiries, candidate lists, chatbot leads, and research paper submissions." />
    <meta name="keywords" content="private dashboard, admin" />
    <link rel="canonical" href="https://saishnaa.com/admin-dashboard" />
    
    <!-- Geo-Targeting Metadata -->
    <meta name="geo.region" content="IN-TN" />
    <meta name="geo.placename" content="Erode" />
    <meta name="geo.position" content="11.322977;77.682566" />
    <meta name="ICBM" content="11.322977, 77.682566" />

    <!-- CDNs & Web Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- Navbar placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow-1" style="text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; background-color: #f4f5f8; min-height: 100vh; padding-top: 130px; padding-bottom: 60px;">
      <div class="page-fade-in">
        <div class="container">
          
          <!-- Header Strip -->
          <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 p-4 rounded-4 bg-white border shadow-sm">
            <div class="d-flex align-items-center gap-3">
              <div class="p-3 rounded-circle text-white" style="background-color: var(--main-color);">
                <i data-lucide="shield" style="width: 28px; height: 28px;"></i>
              </div>
              <div class="text-start">
                <h2 class="fw-bold mb-1" style="color: var(--main-color); font-family: Outfit, sans-serif; font-size: 1.85rem;">
                  Saishnaa Administration Portal
                </h2>
                <p class="text-muted small mb-0">
                  Secure local storage dashboard metrics for leads, inquiries, and candidate applications.
                </p>
              </div>
            </div>
            <button id="export-csv-btn" class="btn btn-purple px-4 py-2.5 rounded-pill d-inline-flex align-items-center gap-2 fw-semibold text-white mt-3 mt-md-0">
              <i data-lucide="download" style="width: 16px; height: 16px;"></i> Export to CSV
            </button>
          </div>

          <!-- Dashboard Metrics Grid -->
          <div class="row g-4 mb-4">
            <div class="col-lg-3 col-sm-6">
              <div class="glass-panel p-4 rounded-4 shadow-sm bg-white text-start">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="text-muted small fw-bold text-uppercase">Total Inquiries</span>
                  <i data-lucide="mail" class="text-primary" style="width: 20px; height: 20px;"></i>
                </div>
                <h3 class="fw-bold" style="color: var(--main-color); font-family: Outfit, sans-serif;" id="metric-inquiries">0</h3>
              </div>
            </div>

            <div class="col-lg-3 col-sm-6">
              <div class="glass-panel p-4 rounded-4 shadow-sm bg-white text-start">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="text-muted small fw-bold text-uppercase">Job Applicants</span>
                  <i data-lucide="users" class="text-success" style="width: 20px; height: 20px;"></i>
                </div>
                <h3 class="fw-bold" style="color: var(--main-color); font-family: Outfit, sans-serif;" id="metric-applicants">0</h3>
              </div>
            </div>

            <div class="col-lg-3 col-sm-6">
              <div class="glass-panel p-4 rounded-4 shadow-sm bg-white text-start">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="text-muted small fw-bold text-uppercase">Research Papers</span>
                  <i data-lucide="file-text" class="text-warning" style="width: 20px; height: 20px;"></i>
                </div>
                <h3 class="fw-bold" style="color: var(--main-color); font-family: Outfit, sans-serif;" id="metric-papers">0</h3>
              </div>
            </div>

            <div class="col-lg-3 col-sm-6">
              <div class="glass-panel p-4 rounded-4 shadow-sm bg-white text-start">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="text-muted small fw-bold text-uppercase">Consultation Leads</span>
                  <i data-lucide="check-circle" class="text-info" style="width: 20px; height: 20px;"></i>
                </div>
                <h3 class="fw-bold" style="color: var(--main-color); font-family: Outfit, sans-serif;" id="metric-leads">0</h3>
              </div>
            </div>
          </div>

          <!-- Tab Controls & Search Navigation -->
          <div class="row g-3 align-items-center mb-4">
            <div class="col-md-7 d-flex gap-2 flex-wrap" id="admin-tabs-container">
              <!-- Tabs buttons injected here -->
            </div>

            <div class="col-md-5">
              <div class="input-group glass-panel shadow-sm" style="border-radius: 30px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06);">
                <span class="input-group-text bg-white border-0 ps-3 text-muted">
                  <i data-lucide="search" style="width: 18px; height: 18px;"></i>
                </span>
                <input type="text" id="admin-search-input" class="form-control border-0 py-2.5 ps-2" placeholder="Search..." style="outline: none; box-shadow: none;" />
              </div>
            </div>
          </div>

          <!-- Data Table Wrapper -->
          <div class="glass-panel p-4 rounded-4 shadow-sm bg-white text-start" style="overflow-x: auto; border: 1px solid rgba(0,0,0,0.05);">
            <div id="table-content-area">
              <!-- Table injected dynamically -->
            </div>
          </div>

        </div>
      </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/components.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
      let activeTab = "inquiries";
      let searchTerm = "";

      let inquiries = [];
      let applicants = [];
      let papers = [];
      let leads = [];

      function loadData() {
        inquiries = JSON.parse(localStorage.getItem("saishnaa_inquiries") || "[]");
        applicants = JSON.parse(localStorage.getItem("saishnaa_applicants") || "[]");
        papers = JSON.parse(localStorage.getItem("saishnaa_papers") || "[]");
        leads = JSON.parse(localStorage.getItem("saishnaa_leads") || "[]");

        // Update Stats Counters
        document.getElementById("metric-inquiries").textContent = inquiries.length;
        document.getElementById("metric-applicants").textContent = applicants.length;
        document.getElementById("metric-papers").textContent = papers.length;
        document.getElementById("metric-leads").textContent = leads.length;
      }

      function handleDeleteItem(key, index) {
        if (confirm("Are you sure you want to delete this submission entry?")) {
          const list = JSON.parse(localStorage.getItem(key) || "[]");
          list.splice(index, 1);
          localStorage.setItem(key, JSON.stringify(list));
          loadData();
          renderTabs();
          renderActiveTable();
        }
      }

      // Render Dynamic Tab Buttons
      const tabsContainer = document.getElementById("admin-tabs-container");
      function renderTabs() {
        tabsContainer.innerHTML = `
          <button class="btn px-3 py-2 fw-semibold btn-sm tab-btn ${activeTab === 'inquiries' ? 'btn-purple text-white' : 'btn-outline-purple bg-white text-primary'}" data-tab="inquiries" style="border-radius: 20px; transition: all 0.3s;">
            ✉ Inquiries (${inquiries.length})
          </button>
          <button class="btn px-3 py-2 fw-semibold btn-sm tab-btn ${activeTab === 'applicants' ? 'btn-purple text-white' : 'btn-outline-purple bg-white text-primary'}" data-tab="applicants" style="border-radius: 20px; transition: all 0.3s;">
            👥 Applicants (${applicants.length})
          </button>
          <button class="btn px-3 py-2 fw-semibold btn-sm tab-btn ${activeTab === 'papers' ? 'btn-purple text-white' : 'btn-outline-purple bg-white text-primary'}" data-tab="papers" style="border-radius: 20px; transition: all 0.3s;">
            📄 Manuscripts (${papers.length})
          </button>
          <button class="btn px-3 py-2 fw-semibold btn-sm tab-btn ${activeTab === 'leads' ? 'btn-purple text-white' : 'btn-outline-purple bg-white text-primary'}" data-tab="leads" style="border-radius: 20px; transition: all 0.3s;">
            📞 Consultation Leads (${leads.length})
          </button>
        `;

        // Add Listeners
        const tabBtns = tabsContainer.querySelectorAll(".tab-btn");
        tabBtns.forEach(btn => {
          btn.addEventListener("click", () => {
            activeTab = btn.getAttribute("data-tab");
            searchTerm = "";
            document.getElementById("admin-search-input").value = "";
            document.getElementById("admin-search-input").placeholder = `Search ${activeTab}...`;
            renderTabs();
            renderActiveTable();
          });
        });
      }

      // Filter active items based on active tab and search query
      function getFilteredData() {
        const q = searchTerm.toLowerCase().trim();
        if (activeTab === "inquiries") {
          return inquiries.filter(item => 
            item.inquiry.name.toLowerCase().includes(q) ||
            item.inquiry.email.toLowerCase().includes(q) ||
            item.inquiry.subject.toLowerCase().includes(q) ||
            item.inquiry.message.toLowerCase().includes(q)
          );
        } else if (activeTab === "applicants") {
          return applicants.filter(item => 
            item.applicant.name.toLowerCase().includes(q) ||
            item.applicant.email.toLowerCase().includes(q) ||
            item.applicant.phone.toLowerCase().includes(q) ||
            item.jobTitle.toLowerCase().includes(q)
          );
        } else if (activeTab === "papers") {
          return papers.filter(item => 
            item.authorName.toLowerCase().includes(q) ||
            item.authorEmail.toLowerCase().includes(q) ||
            item.paperTitle.toLowerCase().includes(q) ||
            item.journalCode.toLowerCase().includes(q)
          );
        } else if (activeTab === "leads") {
          return leads.filter(item => item.email.toLowerCase().includes(q));
        }
        return [];
      }

      // Render Active Table Content
      const tableArea = document.getElementById("table-content-area");
      function renderActiveTable() {
        const filtered = getFilteredData();
        
        if (filtered.length === 0) {
          tableArea.innerHTML = `
            <div class="text-center py-5 text-muted">
              <p class="fs-5 mb-0">No records found matching your filters.</p>
            </div>
          `;
          return;
        }

        let tableHeaderHTML = "";
        let tableBodyHTML = "";

        if (activeTab === "inquiries") {
          tableHeaderHTML = `
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Subject</th>
              <th>Message</th>
              <th>Channel</th>
              <th class="text-end">Actions</th>
            </tr>
          `;

          filtered.forEach((item, idx) => {
            const rawIndex = inquiries.indexOf(item);
            tableBodyHTML += `
              <tr>
                <td class="text-nowrap small text-muted"><i class="fas fa-calendar me-1"></i> ${item.date}</td>
                <td class="fw-bold">${item.inquiry.name}</td>
                <td><a href="mailto:${item.inquiry.email}" class="text-decoration-none">${item.inquiry.email}</a></td>
                <td><span class="badge bg-light text-dark border px-2.5 py-1.5">${item.inquiry.subject}</span></td>
                <td style="max-width: 280px; white-space: normal; word-break: break-word;">${item.inquiry.message}</td>
                <td><span class="badge ${item.inquiry.channel === 'WhatsApp' ? 'bg-success' : 'bg-primary'}">${item.inquiry.channel}</span></td>
                <td class="text-end">
                  <button class="btn btn-outline-danger btn-sm rounded-circle p-2 border-0 delete-btn" data-key="saishnaa_inquiries" data-index="${rawIndex}">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                  </button>
                </td>
              </tr>
            `;
          });

        } else if (activeTab === "applicants") {
          tableHeaderHTML = `
            <tr>
              <th>Date</th>
              <th>Position</th>
              <th>Name</th>
              <th>Contact Info</th>
              <th>Resume</th>
              <th>Cover msg</th>
              <th>Channel</th>
              <th class="text-end">Actions</th>
            </tr>
          `;

          filtered.forEach((item, idx) => {
            const rawIndex = applicants.indexOf(item);
            tableBodyHTML += `
              <tr>
                <td class="text-nowrap small text-muted"><i class="fas fa-calendar me-1"></i> ${item.date}</td>
                <td class="fw-bold text-primary">${item.jobTitle}</td>
                <td class="fw-bold">${item.applicant.name}</td>
                <td>
                  <div class="small">
                    <div>Email: <a href="mailto:${item.applicant.email}">${item.applicant.email}</a></div>
                    <div>Phone: <a href="tel:${item.applicant.phone}">${item.applicant.phone}</a></div>
                  </div>
                </td>
                <td>
                  <span class="badge bg-success-subtle text-success border border-success-subtle px-2.5 py-1.5 fw-bold">
                    📄 ${item.applicant.resumeName || 'uploaded_resume.pdf'}
                  </span>
                </td>
                <td style="max-width: 200px; white-space: normal; word-break: break-word;">${item.applicant.cover || 'N/A'}</td>
                <td><span class="badge ${item.applicant.channel === 'WhatsApp' ? 'bg-success' : 'bg-primary'}">${item.applicant.channel}</span></td>
                <td class="text-end">
                  <button class="btn btn-outline-danger btn-sm rounded-circle p-2 border-0 delete-btn" data-key="saishnaa_applicants" data-index="${rawIndex}">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                  </button>
                </td>
              </tr>
            `;
          });

        } else if (activeTab === "papers") {
          tableHeaderHTML = `
            <tr>
              <th>Date</th>
              <th>Journal</th>
              <th>Author Name</th>
              <th>Institution & Email</th>
              <th>Paper Title & Abstract</th>
              <th>File</th>
              <th class="text-end">Actions</th>
            </tr>
          `;

          filtered.forEach((item, idx) => {
            const rawIndex = papers.indexOf(item);
            tableBodyHTML += `
              <tr>
                <td class="text-nowrap small text-muted"><i class="fas fa-calendar me-1"></i> ${item.date}</td>
                <td><span class="badge bg-warning-subtle text-warning-emphasis border border-warning-subtle">${item.journalCode}</span></td>
                <td class="fw-bold">${item.authorName}</td>
                <td>
                  <div class="small">
                    <strong>${item.authorInstitution}</strong>
                    <div><a href="mailto:${item.authorEmail}">${item.authorEmail}</a></div>
                  </div>
                </td>
                <td style="max-width: 300px;">
                  <div class="fw-bold text-dark mb-1">${item.paperTitle}</div>
                  <div class="small text-muted text-truncate-2">${item.paperAbstract}</div>
                </td>
                <td>
                  <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle px-2.5 py-1.5">
                    📄 ${item.fileName}
                  </span>
                </td>
                <td class="text-end">
                  <button class="btn btn-outline-danger btn-sm rounded-circle p-2 border-0 delete-btn" data-key="saishnaa_papers" data-index="${rawIndex}">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                  </button>
                </td>
              </tr>
            `;
          });

        } else if (activeTab === "leads") {
          tableHeaderHTML = `
            <tr>
              <th>Date</th>
              <th>Lead Contact Email</th>
              <th class="text-end">Actions</th>
            </tr>
          `;

          filtered.forEach((item, idx) => {
            const rawIndex = leads.indexOf(item);
            tableBodyHTML += `
              <tr>
                <td class="text-nowrap small text-muted"><i class="fas fa-calendar me-1"></i> ${item.date}</td>
                <td class="fw-bold"><a href="mailto:${item.email}">${item.email}</a></td>
                <td class="text-end">
                  <button class="btn btn-outline-danger btn-sm rounded-circle p-2 border-0 delete-btn" data-key="saishnaa_leads" data-index="${rawIndex}">
                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                  </button>
                </td>
              </tr>
            `;
          });
        }

        tableArea.innerHTML = `
          <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;">
            <thead class="table-light">
              ${tableHeaderHTML}
            </thead>
            <tbody>
              ${tableBodyHTML}
            </tbody>
          </table>
        `;

        // Hook Lucide Icons
        if (window.lucide && typeof window.lucide.createIcons === "function") {
          window.lucide.createIcons();
        }

        // Attach Deletion Listeners
        const delBtns = tableArea.querySelectorAll(".delete-btn");
        delBtns.forEach(btn => {
          btn.addEventListener("click", () => {
            const key = btn.getAttribute("data-key");
            const index = parseInt(btn.getAttribute("data-index"));
            handleDeleteItem(key, index);
          });
        });
      }

      // Dynamic Search Filtering
      document.getElementById("admin-search-input").addEventListener("input", (e) => {
        searchTerm = e.target.value;
        renderActiveTable();
      });

      // Export CSV Action
      document.getElementById("export-csv-btn").addEventListener("click", () => {
        const dataList = getFilteredData();
        if (dataList.length === 0) {
          alert("No data available to export.");
          return;
        }

        let csvContent = "";
        let fileName = `saishnaa_${activeTab}_export_${new Date().toISOString().split("T")[0]}.csv`;

        if (activeTab === "inquiries") {
          csvContent += "Date,Name,Email,Subject,Channel,Message\n";
          dataList.forEach(item => {
            const msg = item.inquiry.message.replace(/"/g, '""');
            csvContent += `"${item.date}","${item.inquiry.name}","${item.inquiry.email}","${item.inquiry.subject}","${item.inquiry.channel}","${msg}"\n`;
          });
        } else if (activeTab === "applicants") {
          csvContent += "Date,Job Title,Name,Email,Phone,Channel,Resume Name,Cover Message\n";
          dataList.forEach(item => {
            const cover = item.applicant.cover.replace(/"/g, '""');
            csvContent += `"${item.date}","${item.jobTitle}","${item.applicant.name}","${item.applicant.email}","${item.applicant.phone}","${item.applicant.channel}","${item.applicant.resumeName || 'N/A'}","${cover}"\n`;
          });
        } else if (activeTab === "papers") {
          csvContent += "Date,Journal Code,Author Name,Author Email,Institution,Paper Title,File Name,Abstract\n";
          dataList.forEach(item => {
            const abstract = item.paperAbstract.replace(/"/g, '""');
            csvContent += `"${item.date}","${item.journalCode}","${item.authorName}","${item.authorEmail}","${item.authorInstitution}","${item.paperTitle}","${item.fileName}","${abstract}"\n`;
          });
        } else if (activeTab === "leads") {
          csvContent += "Date,Consultation Lead Email\n";
          dataList.forEach(item => {
            csvContent += `"${item.date}","${item.email}"\n`;
          });
        }

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = "hidden";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

      // Initial Calls
      loadData();
      renderTabs();
      renderActiveTable();

      // Initialize Lucide Icons initially
      lucide.createIcons();
    </script>
    <style>
      .text-truncate-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </body>
</html>
